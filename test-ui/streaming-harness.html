<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KaTeX Streaming Test Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 16px; }
    #root { display: flex; flex-direction: column; height: calc(100vh - 32px); }
    .chatContainer_07S1Yg { display: flex; flex-direction: column; height: 100%; }
    .messagesContainer_07S1Yg { overflow-y: auto; display: flex; flex-direction: column; flex: 1; padding: 16px; gap: 16px; border: 1px solid #45475a; border-radius: 8px; }
    .turn_07S1Yg { display: flex; flex-direction: column; gap: 8px; }
    .message_07S1Yg { padding: 8px 16px; border-radius: 12px; line-height: 1.6; }
    .message_07S1Yg.user { background: #585b70; align-self: flex-end; max-width: 80%; }
    .message_07S1Yg.assistant { background: #313244; max-width: 90%; }
    .controls { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .controls button { padding: 8px 12px; background: #74c7ec; color: #1e1e2e; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    #status { padding: 8px 12px; background: #181825; color: #a6adc8; font-family: monospace; font-size: 12px; border-radius: 6px; white-space: pre-wrap; }
    .katex { color: #cdd6f4 !important; }
    .message_07S1Yg p { margin: 0; }
    .message_07S1Yg em { color: #f5c2e7; font-style: italic; }
  </style>
</head>
<body>
  <div id="root">
    <div class="chatContainer_07S1Yg">
      <div class="messagesContainer_07S1Yg" id="messages">
        <div class="turn_07S1Yg" id="initial-turn">
          <div class="message_07S1Yg user" id="user-msg-1">Can you show me some math?</div>
        </div>
      </div>
      <div class="controls">
        <button id="btn-a">A: innerHTML each token</button>
        <button id="btn-b">B: textContent each token</button>
        <button id="btn-c">C: appendText each token</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div id="status">ready</div>
    </div>
  </div>

  <link rel="stylesheet" href="/vendor/katex.min.css">
  <script src="/vendor/katex.min.js"></script>
  <script src="/vendor/auto-render.min.js"></script>

  <!-- Load markdown-it from CDN so we can parse markdown to HTML (no React needed) -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>

  <script>
    const status = document.getElementById('status');
    const md = window.markdownit({ html: false, linkify: false, typographer: false });

    // We simulate 3 distinct streaming DOM-mutation patterns, all of which are
    // plausible renderer behaviors in a streaming chat UI:
    //
    //   A. Re-render full subtree on every token (most react-markdown-like).
    //      Each token -> assistantEl.innerHTML = md.render(accumulatedText)
    //      This produces many childList mutations inside the message subtree.
    //
    //   B. Update text of a single text node on every token.
    //      Each token -> p.textContent = accumulatedText
    //      This produces characterData mutations.
    //
    //   C. Append a new text node each token (no replacement).
    //      Each token -> p.appendChild(document.createTextNode(chunk))
    //      This produces childList mutations with added TEXT nodes (not elements).

    function resetAssistant() {
      const container = document.getElementById('messages');
      // Remove any existing assistant turns
      [...container.querySelectorAll('.turn_07S1Yg:not(#initial-turn)')].forEach((el) => el.remove());
      const turn = document.createElement('div');
      turn.className = 'turn_07S1Yg';
      const msg = document.createElement('div');
      msg.className = 'message_07S1Yg assistant';
      msg.setAttribute('data-testid', 'assistant-message');
      turn.appendChild(msg);
      container.appendChild(turn);
      return msg;
    }

    async function streamPatternA(text, chunk = 1, delay = 20) {
      const msg = resetAssistant();
      let acc = '';
      for (let i = 0; i < text.length; i += chunk) {
        acc += text.slice(i, i + chunk);
        msg.innerHTML = md.render(acc);
        await new Promise((r) => setTimeout(r, delay));
      }
      status.textContent = 'A done, html len=' + msg.innerHTML.length;
    }

    async function streamPatternB(text, chunk = 1, delay = 20) {
      const msg = resetAssistant();
      const p = document.createElement('p');
      msg.appendChild(p);
      let acc = '';
      for (let i = 0; i < text.length; i += chunk) {
        acc += text.slice(i, i + chunk);
        p.textContent = acc;
        await new Promise((r) => setTimeout(r, delay));
      }
      status.textContent = 'B done, len=' + acc.length;
    }

    async function streamPatternC(text, chunk = 1, delay = 20) {
      const msg = resetAssistant();
      const p = document.createElement('p');
      msg.appendChild(p);
      for (let i = 0; i < text.length; i += chunk) {
        const piece = text.slice(i, i + chunk);
        p.appendChild(document.createTextNode(piece));
        await new Promise((r) => setTimeout(r, delay));
      }
      status.textContent = 'C done';
    }

    const DEMO_TEXT = `Here is inline math: $x^2 + y^2 = z^2$ and also $E = mc^2$.

And display math:

$$\\int_0^\\infty e^{-x^2} dx = \\frac{\\sqrt{\\pi}}{2}$$

Another inline: $\\alpha + \\beta$.`;

    document.getElementById('btn-a').onclick = () => streamPatternA(DEMO_TEXT, 2, 30);
    document.getElementById('btn-b').onclick = () => streamPatternB(DEMO_TEXT, 2, 30);
    document.getElementById('btn-c').onclick = () => streamPatternC(DEMO_TEXT, 2, 30);
    document.getElementById('btn-reset').onclick = () => {
      resetAssistant().remove();
      status.textContent = 'reset';
    };

    // Playwright API
    window.__streamA = streamPatternA;
    window.__streamB = streamPatternB;
    window.__streamC = streamPatternC;
    window.__resetAssistant = () => {
      [...document.querySelectorAll('.turn_07S1Yg:not(#initial-turn)')].forEach((el) => el.remove());
    };
    window.__testReady = true;
    status.textContent = 'markdown-it loaded, ready';
  </script>

  <script id="patch-script">/* __PATCH_SCRIPT__ */</script>
</body>
</html>
