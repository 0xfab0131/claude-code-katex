}

    const wrap = wraps[i], r = wrap.querySelector('.render');

  const passed = results.filter(r => r.ok).length;
  const s = document.getElementById('summary');
  s.textContent = passed + ' / ' + results.length + ' passed';
  s.style.color = passed === results.length ? '#4caf50' : '#f44336';

  window.__DONE = true;
